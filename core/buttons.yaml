button:
  - platform: template
    name: "Dev1 Light Toggle"
    id: dev1_light_toggle
    icon: mdi:lightbulb
    on_press:
      - lambda: |-
          id(current_target) = 1;
          std::string current = id(state_dev1_brt).state;
          if (current == "0%") id(state_dev1_brt).make_call().set_option("100%").perform();
          else id(state_dev1_brt).make_call().set_option("0%").perform();

  - platform: template
    name: "Dev2 Light Toggle"
    id: dev2_light_toggle
    icon: mdi:lightbulb
    on_press:
      - lambda: |-
          id(current_target) = 4;
          std::string current = id(state_dev2_brt).state;
          if (current == "0%") id(state_dev2_brt).make_call().set_option("100%").perform();
          else id(state_dev2_brt).make_call().set_option("0%").perform();

  - platform: restart
    name: "Restart Device"
