select:
  - platform: template
    name: "Dev1 Light Brightness"
    id: state_dev1_brt
    options: ["0%", "20%", "40%", "50%", "60%", "80%", "100%"]
    optimistic: true
    set_action:
      - if:
          condition: { lambda: 'return !id(is_updating_from_tracker);' }
          then: 
            - lambda: 'id(pending_state_value) = x;'  # 【新增】先保存新值
            - lambda: 'id(current_target) = 1;'
            - script.execute: debounce_timer

  - platform: template
    name: "Dev1 Light Color Temp"
    id: state_dev1_ct
    options: ["2700K", "3650K", "4600K", "5550K", "6500K"]
    optimistic: true
    set_action:
      - if:
          condition: { lambda: 'return !id(is_updating_from_tracker);' }
          then: 
            - lambda: 'id(pending_state_value) = x;'
            - lambda: 'id(current_target) = 2;'
            - script.execute: debounce_timer

  - platform: template
